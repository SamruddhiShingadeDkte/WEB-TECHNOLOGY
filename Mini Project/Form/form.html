<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel= "stylesheet" href="style.css">
    <title>Submission form</title>
</head>
<body>
    <div id="form-container">
        <h2>Voter Id Form</h2>
        <label id="name">Name of applicant : </label>
        <input id="name1" placeholder="Enter name here">
        <br>
        <label id="area">Location of living : </label>
        <input id="area1" placeholder="Enter location here">
        <br>
        <label id="age">Age of applicant : </label>
        <input id="age1" placeholder="Enter age here">
        <br>
        <button id="save">Submit</button>
    </div>
    <script src="./form.js"></script>
</body>
</html>
