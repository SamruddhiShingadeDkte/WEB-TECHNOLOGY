<!--document.getElementById('title').id;  This selects the element whose id is "title" and returns its id value.
    document.getElementById('title').className; Returns all the class names of that element as a string.here if we have used the multiple classes (css classes to apply the external css) then that all are returned here 
    document.getElementById('title').getAttribute;  getAttribute() returns the value of a specific attribute like id, class, href, etc.
    document.getElementById('title').setAttribute;  setAttribute() is used to add or modify an attribute of an element dynamically.
    document.getElementById('title').innerHTML;  innerHTML returns or modifies the HTML inside an element, including tags.
    document.getElementById('title').innerText ; innerText is used to get or update the visible text content inside HTML elements that can contain text, such as div, p, span, and h1.

    We can give HTML tags inside innerHTML, but we cannot give tags inside innerText
